plugins {
    id 'com.android.application'
}

android {
    namespace 'com.tencentbyd.audiovisualizertest'
    compileSdk 35

    defaultConfig {
        applicationId 'com.tencentbyd.audiovisualizertest'
        minSdk 29
        targetSdk 32
        versionCode 1
        versionName '1.0-clean'
    }

    buildTypes {
        debug {
            applicationIdSuffix ''
            versionNameSuffix '-debug'
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
